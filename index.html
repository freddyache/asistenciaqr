<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula PIP - Gestión Integral</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-green: #28a745;
            --admin-blue: #2e9aff;
            --bg-gradient: linear-gradient(180deg, #d8dbf1 0%, #a4bdf5 100%);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* --- MENÚ HAMBURGUESA --- */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            cursor: pointer;
            background: var(--primary-green);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 22px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s ease;
            z-index: 1000;
            padding-top: 70px;
        }

        .side-menu.active { left: 0; }

        .menu-item {
            padding: 18px 25px;
            display: block;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #f0f0f0;
            font-weight: 500;
            cursor: pointer;
        }

        .menu-item:hover { background: #f8f9fa; color: var(--primary-green); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            background: white;
            width: 92%;
            max-width: 420px;
            margin-top: 80px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 40px;
            height: fit-content;
        }

        .header { background: var(--primary-green); color: white; text-align: center; padding: 25px; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        .section { display: none; padding: 25px; }
        .section.active { display: block; }

        /* --- FORMULARIOS --- */
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #444; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none;
        }
        .form-control:focus { border-color: var(--admin-blue); box-shadow: 0 0 0 3px rgba(46, 154, 255, 0.1); }

        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; color: white; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-green { background: var(--primary-green); }
        .btn-blue { background: var(--admin-blue); }
        .btn-gray { background: #6c757d; }

        /* --- CÁMARA --- */
        .camera-box {
            border: 2px dashed var(--primary-green);
            background: #f0fdf4;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-height: 220px;
            position: relative;
        }
        #reader { width: 100%; border-radius: 10px; }
        #status-camera { padding: 40px 0; color: #666; font-weight: 500; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 999;
        }
        .overlay.active { display: block; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"> ☰ </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-item" onclick="showSection('escaneo')">🏠 Escáner de Asistencia</div>
        <div class="menu-item" onclick="showSection('agregar')">👤 Agregar Estudiante</div>
        <div class="menu-item" onclick="showSection('impresion')">🪪 Impresión de Carnets</div>
        <div class="menu-item" onclick="alert('Módulo en desarrollo...')">📊 Reporte General</div>
        <div class="menu-item" onclick="alert('Módulo en desarrollo...')">⚙️ Configuración</div>
    </div>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="header">
            <h1 id="view-title">Asistencia QR</h1>
        </div>

        <div id="escaneo" class="section active">
            <div class="camera-box">
                <div id="status-camera">Cargando cámara trasera...</div>
                <div id="reader"></div>
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label>Tipo de Registro:</label>
                <select id="status-select" class="form-control">
                    <option value="ENTRADA">INGRESO</option>
                    <option value="SALIDA">SALIDA</option>
                </select>
            </div>
        </div>

        <div id="agregar" class="section">
            <div class="form-group">
                <label>DNI / ID:</label>
                <input type="number" id="new-dni" class="form-control" placeholder="DNI del alumno">
            </div>
            <div class="form-group">
                <label>Nombres:</label>
                <input type="text" id="new-nombres" class="form-control" placeholder="EJ: JUAN ROBERTO">
            </div>
            <div class="form-group">
                <label>Apellidos:</label>
                <input type="text" id="new-apellidos" class="form-control" placeholder="EJ: PEREZ GARCIA">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Grado:</label>
                    <select id="new-grado" class="form-control">
                        <option value="1">1°</option><option value="2">2°</option><option value="3">3°</option><option value="4">4°</option><option value="5">5°</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Sección:</label>
                    <select id="new-seccion" class="form-control">
                        <option value="A">A</option><option value="B">B</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="tel" id="new-celular" class="form-control" placeholder="Celular de contacto">
            </div>

            <button id="btn-save" class="btn-main btn-blue" onclick="guardarAlumno()">Guardar Estudiante</button>
        </div>

        <div id="impresion" class="section">
            <div class="form-group">
                <label>ID Carpeta Drive (Guardado):</label>
                <input type="text" id="folder-id" class="form-control" placeholder="ID de la carpeta de Google Drive">
            </div>

            <div class="form-group">
                <label>Modalidad de Impresión:</label>
                <select id="print-type" class="form-control" onchange="togglePrintInputs()">
                    <option value="individual">Por Alumno Único (DNI)</option>
                    <option value="seccion">Por Grado y Sección</option>
                    <option value="todos">Todos los Registrados</option>
                </select>
            </div>

            <div id="input-dni" class="form-group">
                <label>DNI del Alumno:</label>
                <input type="number" id="print-dni" class="form-control" placeholder="Ingrese DNI">
            </div>

            <div id="input-seccion" class="form-group" style="display:none; gap:10px;">
                <div style="flex:1">
                    <label>Grado:</label>
                    <select id="print-grado" class="form-control">
                        <option value="1">1°</option><option value="2">2°</option><option value="3">3°</option><option value="4">4°</option><option value="5">5°</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Sección:</label>
                    <select id="print-seccion" class="form-control">
                        <option value="A">A</option><option value="B">B</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-main btn-gray" style="flex:1;" onclick="generarCarnet(true)">Vista Previa</button>
                <button class="btn-main btn-blue" style="flex:1;" onclick="generarCarnet(false)">Generar PDF</button>
            </div>
            <p style="font-size: 11px; color: #777; margin-top: 10px; text-align: center;">El PDF organizará 8 carnets por hoja A4 automáticamente.</p>
        </div>
    </div>

<script>
    // --- CONFIGURACIÓN ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwdpm5fB3YblfT78g6V8ThF8xzKzJ5x0q-ARIdaVN0i30xz5sGq7OyQmlxohmWeM9zKNQ/exec'; // <--- PEGA TU URL DE GOOGLE AQUÍ

    const html5QrCode = new Html5Qrcode("reader");

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        const titulos = {'escaneo': 'Asistencia QR', 'agregar': 'Nuevo Estudiante', 'impresion': 'Impresión Masiva'};
        document.getElementById('view-title').innerText = titulos[id];
        
        if(id === 'escaneo') { iniciarCamara(); } else { detenerCamara(); }
        toggleMenu();
    }

    function togglePrintInputs() {
        const type = document.getElementById('print-type').value;
        document.getElementById('input-dni').style.display = (type === 'individual') ? 'block' : 'none';
        document.getElementById('input-seccion').style.display = (type === 'seccion') ? 'flex' : 'none';
    }

    // --- LÓGICA: ASISTENCIA ---
    function onScanSuccess(decodedText) {
        const estado = document.getElementById('status-select').value;
        html5QrCode.stop().then(() => {
            document.getElementById('status-camera').innerText = "Procesando...";
            document.getElementById('status-camera').style.display = 'block';
            
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'asistencia', id: decodedText, estado: estado })
            })
            .then(r => r.text()).then(msg => {
                alert(msg);
                location.reload();
            });
        });
    }

    // --- LÓGICA: AGREGAR ALUMNO ---
    function guardarAlumno() {
        const btn = document.getElementById('btn-save');
        const datos = {
            action: 'agregar',
            id: document.getElementById('new-dni').value,
            nombres: document.getElementById('new-nombres').value.toUpperCase(),
            apellidos: document.getElementById('new-apellidos').value.toUpperCase(),
            gradoSeccion: document.getElementById('new-grado').value + document.getElementById('new-seccion').value,
            telefono: document.getElementById('new-celular').value,
            perfil: "ESTUDIANTE"
        };

        if(!datos.id || !datos.nombres || !datos.apellidos) return alert("DNI, Nombres y Apellidos son obligatorios");

        btn.disabled = true;
        btn.innerText = "Guardando en Sheets...";

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(datos) })
        .then(r => r.text()).then(msg => {
            alert(msg);
            showSection('escaneo');
        }).finally(() => {
            btn.disabled = false;
            btn.innerText = "Guardar Estudiante";
        });
    }

    // --- LÓGICA: IMPRESIÓN ---
    function generarCarnet(esPreview) {
        const folderId = document.getElementById('folder-id').value;
        if(!folderId) return alert("Ingresa el ID de la carpeta de Drive destino");

        const datos = {
            action: 'imprimir',
            preview: esPreview,
            tipo: document.getElementById('print-type').value,
            dni: document.getElementById('print-dni').value,
            gradoSeccion: document.getElementById('print-grado').value + document.getElementById('print-seccion').value,
            folderId: folderId
        };

        alert(esPreview ? "Generando Vista Previa en Docs..." : "Generando PDF con 8 carnets por hoja...");

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(datos) })
        .then(r => r.text())
        .then(res => {
            if(res.includes("http")) {
                window.open(res, '_blank');
            } else {
                alert(res);
            }
        });
    }

    // --- CONTROL DE CÁMARA ---
    function iniciarCamara() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .then(() => document.getElementById('status-camera').style.display = 'none')
        .catch(() => document.getElementById('status-camera').innerText = "Error: Acceso a cámara denegado.");
    }

    function detenerCamara() {
        if(html5QrCode.isScanning) html5QrCode.stop();
    }

    window.onload = iniciarCamara;
</script>
</body>
</html>
