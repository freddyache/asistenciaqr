<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula PIP - Gestión Escolar</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-green: #28a745;
            --admin-blue: #2e9aff;
            --bg-gradient: linear-gradient(180deg, #d8dbf1 0%, #a4bdf5 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* --- MENÚ HAMBURGUESA --- */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            cursor: pointer;
            background: var(--primary-green);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
            padding-top: 60px;
        }

        .side-menu.active { left: 0; }

        .menu-item {
            padding: 15px 25px;
            display: block;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            font-weight: 500;
            cursor: pointer;
        }

        .menu-item:hover { background: #f4f4f4; color: var(--primary-green); }

        /* --- CONTENEDOR --- */
        .container {
            background: white;
            width: 90%;
            max-width: 400px;
            margin-top: 70px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .header { background: var(--primary-green); color: white; text-align: center; padding: 20px; }
        .header h1 { margin: 0; font-size: 22px; }

        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        /* --- FORMULARIOS --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #444; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 15px;
        }

        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-weight: bold; color: white; cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        .btn-save { background: var(--admin-blue); }
        .btn-save:disabled { background: #ccc; }

        /* Cámara */
        .camera-box {
            border: 2px dashed var(--primary-green);
            background: #f0fdf4;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-height: 200px;
        }
        #reader { width: 100%; border-radius: 10px; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"> ☰ </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-item" onclick="showSection('escaneo')">🏠 Escáner de Asistencia</div>
        <div class="menu-item" onclick="showSection('agregar')">👤 Agregar Estudiante</div>
        <div class="menu-item" onclick="alert('Módulo en desarrollo')">📊 Reporte de Asistencia</div>
        <div class="menu-item" onclick="alert('Módulo en desarrollo')">🪪 Impresión de Carnets</div>
        <div class="menu-item" onclick="alert('Módulo en desarrollo')">⚙️ Configuración</div>
    </div>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="header">
            <h1 id="view-title">Asistencia QR</h1>
        </div>

        <div id="escaneo" class="section active">
            <div class="camera-box">
                <div id="status-camera">Cargando cámara...</div>
                <div id="reader"></div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Tipo de Registro:</label>
                <select id="status-select" class="form-control">
                    <option value="ENTRADA">INGRESO</option>
                    <option value="SALIDA">SALIDA</option>
                </select>
            </div>
        </div>

        <div id="agregar" class="section">
            <div class="form-group">
                <label>DNI / ID:</label>
                <input type="number" id="new-dni" class="form-control" placeholder="DNI del alumno">
            </div>
            <div class="form-group">
                <label>Nombres:</label>
                <input type="text" id="new-nombres" class="form-control" placeholder="Ej: JUAN">
            </div>
            <div class="form-group">
                <label>Apellidos:</label>
                <input type="text" id="new-apellidos" class="form-control" placeholder="Ej: PEREZ">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Grado:</label>
                    <select id="new-grado" class="form-control">
                        <option value="1">1°</option>
                        <option value="2">2°</option>
                        <option value="3">3°</option>
                        <option value="4">4°</option>
                        <option value="5">5°</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Sección:</label>
                    <select id="new-seccion" class="form-control">
                        <option value="A">A</option>
                        <option value="B">B</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="tel" id="new-celular" class="form-control" placeholder="Celular">
            </div>

            <button id="btn-save" class="btn-main btn-save" onclick="guardarAlumno()">Guardar Estudiante</button>
        </div>
    </div>

<script>
    // --- PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpSBLk3nbrGXfoQODQFMb6vMUfseuzEK3epcoWpTvvU7o9rNVADV2hC_E7ph6gCivV_Q/exec'; 

    const html5QrCode = new Html5Qrcode("reader");

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('view-title').innerText = (id === 'escaneo') ? "Asistencia QR" : "Nuevo Estudiante";
        
        if(id === 'escaneo') { iniciarCamara(); } else { detenerCamara(); }
        toggleMenu();
    }

    function onScanSuccess(decodedText) {
        const estado = document.getElementById('status-select').value;
        html5QrCode.stop().then(() => {
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'asistencia', id: decodedText, estado: estado })
            })
            .then(r => r.text()).then(msg => {
                alert(msg);
                location.reload();
            });
        });
    }

    function guardarAlumno() {
        const btn = document.getElementById('btn-save');
        const datos = {
            action: 'agregar',
            id: document.getElementById('new-dni').value,
            nombres: document.getElementById('new-nombres').value.toUpperCase(),
            apellidos: document.getElementById('new-apellidos').value.toUpperCase(),
            gradoSeccion: document.getElementById('new-grado').value + document.getElementById('new-seccion').value,
            telefono: document.getElementById('new-celular').value,
            perfil: "ESTUDIANTE"
        };

        if(!datos.id || !datos.nombres) return alert("Completa DNI y Nombres");

        btn.disabled = true;
        btn.innerText = "Enviando...";

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(datos) })
        .then(r => r.text()).then(msg => {
            alert(msg);
            showSection('escaneo');
        }).finally(() => {
            btn.disabled = false;
            btn.innerText = "Guardar Estudiante";
        });
    }

    function iniciarCamara() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .then(() => document.getElementById('status-camera').style.display = 'none')
        .catch(() => document.getElementById('status-camera').innerText = "Error al abrir cámara");
    }

    function detenerCamara() {
        if(html5QrCode.isScanning) html5QrCode.stop();
    }

    window.onload = iniciarCamara;
</script>
</body>
</html>
