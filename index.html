<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula PIP - Gestión</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #28a745;
            --admin-color: #2e9aff;
            --bg-gradient: linear-gradient(180deg, #d8dbf1 0%, #a4bdf5 100%);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            min-height: 100vh;
        }

        /* --- MENÚ HAMBURGUESA --- */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            cursor: pointer;
            color: white;
            font-size: 24px;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 999;
            padding-top: 60px;
        }

        .side-menu.active { left: 0; }

        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .menu-item:hover { background: #f8f9fa; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            background-color: #fff;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            margin: 60px auto 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header { background: var(--primary-color); color: white; text-align: center; padding: 20px; }
        .header h1 { margin: 0; font-size: 20px; }

        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        /* --- ESTILOS DE FORMULARIO --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-weight: bold; color: white; cursor: pointer; margin-top: 10px;
        }
        .btn-save { background: var(--admin-color); }
        .btn-qr { background: var(--primary-color); }

        /* Estilos Cámara (Iguales a la versión anterior) */
        .camera-container { border: 2px solid #a4e4ae; background: #f0fdf4; border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 8px; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 998;
        }
        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"> ☰ </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-item" onclick="showSection('escaneo')">🏠 Escáner Asistencia</div>
        <div class="menu-item" onclick="showSection('agregar')">👤 Agregar Alumno</div>
        <div class="menu-item" onclick="alert('Próximamente...')">📊 Reporte de Asistencia</div>
        <div class="menu-item" onclick="alert('Próximamente...')">🪪 Impresión de Carnets</div>
        <div class="menu-item" onclick="alert('Próximamente...')">⚙️ Configuración</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="header">
            <h1 id="view-title">Aula PIP</h1>
        </div>

        <div id="escaneo" class="section active">
            <div class="camera-container">
                <div id="status">Iniciando cámara...</div>
                <div id="reader"></div>
            </div>
            <div class="form-group">
                <label>Estado:</label>
                <select id="status-select" class="form-control">
                    <option value="ENTRADA">INGRESO</option>
                    <option value="SALIDA">SALIDA</option>
                </select>
            </div>
            <p style="text-align: center; font-size: 12px; color: #666;">Usa el menú para agregar estudiantes manualmente.</p>
        </div>

        <div id="agregar" class="section">
            <div class="form-group">
                <label>DNI / ID:</label>
                <input type="number" id="new-dni" class="form-control" placeholder="Ej: 71234567">
            </div>
            <div class="form-group">
                <label>Nombres:</label>
                <input type="text" id="new-nombres" class="form-control" placeholder="Ej: Juan Roberto">
            </div>
            <div class="form-group">
                <label>Apellidos:</label>
                <input type="text" id="new-apellidos" class="form-control" placeholder="Ej: Perez Garcia">
            </div>
            <div class="form-group">
                <label>Celular:</label>
                <input type="tel" id="new-celular" class="form-control" placeholder="Ej: 999888777">
            </div>
            <button class="btn-main btn-save" onclick="guardarNuevoAlumno()">Guardar Estudiante</button>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyUvf1qb_vNN0neT5x7wglvgtIKq3pSSmVCXwmnnVXxGloE5XhLU4u7fr8NxzZySeo_dA/exec'; // PEGA TU URL AQUÍ
    const html5QrCode = new Html5Qrcode("reader");

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(id) {
        // Ocultar todas las secciones
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        // Mostrar la seleccionada
        document.getElementById(id).classList.add('active');
        
        // Cambiar título y cerrar menú
        const titulos = {'escaneo': 'Asistencia QR', 'agregar': 'Nuevo Alumno'};
        document.getElementById('view-title').innerText = titulos[id];
        
        // Manejar cámara
        if(id === 'escaneo') { iniciarCamara(); } else { detenerCamara(); }
        toggleMenu();
    }

    // --- LÓGICA DE ASISTENCIA ---
    function onScanSuccess(decodedText) {
        const estado = document.getElementById('status-select').value;
        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: 'asistencia', id: decodedText, estado: estado })
        })
        .then(r => r.text()).then(msg => {
            alert(msg);
            location.reload();
        });
    }

    // --- LÓGICA AGREGAR ALUMNO ---
    function guardarNuevoAlumno() {
        const datos = {
            action: 'agregar',
            id: document.getElementById('new-dni').value,
            nombres: document.getElementById('new-nombres').value,
            apellidos: document.getElementById('new-apellidos').value,
            celular: document.getElementById('new-celular').value
        };

        if(!datos.id || !datos.nombres) return alert("DNI y Nombres son obligatorios");

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(datos)
        })
        .then(r => r.text()).then(msg => {
            alert(msg);
            showSection('escaneo');
        });
    }

    // Funciones de cámara (Iguales a las anteriores)
    function iniciarCamara() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .catch(err => document.getElementById('status').innerText = "Cámara apagada");
    }
    function detenerCamara() {
        if(html5QrCode.isScanning) html5QrCode.stop();
    }

    window.onload = iniciarCamara;
</script>
</body>
</html>
