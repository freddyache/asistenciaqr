<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Aula PIP - Gestión Integral</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #28a745;
            --secondary: #2e9aff;
            --dark: #343a40;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background: linear-gradient(180deg, #d8dbf1 0%, #a4bdf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* --- MENÚ HAMBURGUESA --- */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            cursor: pointer;
            background: var(--primary);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 3px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s ease-in-out;
            z-index: 1000;
            padding-top: 70px;
        }

        .side-menu.active { left: 0; }

        .menu-item {
            padding: 18px 25px;
            display: block;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            cursor: pointer;
        }

        .menu-item:hover { background: var(--light); color: var(--primary); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            background: white;
            width: 92%;
            max-width: 420px;
            margin-top: 80px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 40px;
            height: fit-content;
        }

        .header { background: var(--primary); color: white; text-align: center; padding: 25px; }
        .header h1 { margin: 0; font-size: 22px; }

        .section { display: none; padding: 25px; }
        .section.active { display: block; }

        /* --- ESTILOS DE FORMULARIO --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 15px;
        }

        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; color: white; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--primary); }
        .btn-dark { background: var(--dark); }

        /* --- ESCÁNER --- */
        .camera-box {
            border: 2px dashed var(--primary);
            background: #f0fdf4;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-height: 220px;
        }
        #reader { width: 100%; border-radius: 10px; }
        #status-msg { padding: 20px; color: #666; font-style: italic; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"> ☰ </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-item" onclick="showSection('escaneo')">🏠 Escáner Asistencia</div>
        <div class="menu-item" onclick="showSection('agregar')">👤 Agregar Estudiante</div>
        <div class="menu-item" onclick="showSection('impresion')">🪪 Impresión de Carnets</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="header">
            <h1 id="view-title">Asistencia QR</h1>
        </div>

        <div id="escaneo" class="section active">
            <div class="camera-box">
                <div id="status-msg">Iniciando cámara...</div>
                <div id="reader"></div>
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label>Tipo de Registro:</label>
                <select id="status-select" class="form-control">
                    <option value="ENTRADA">INGRESO</option>
                    <option value="SALIDA">SALIDA</option>
                </select>
            </div>
        </div>

        <div id="agregar" class="section">
            <div class="form-group">
                <label>DNI (ID):</label>
                <input type="number" id="new-dni" class="form-control" placeholder="Número de DNI">
            </div>
            <div class="form-group">
                <label>Nombres:</label>
                <input type="text" id="new-nombres" class="form-control" placeholder="EJ: JUAN ROBERTO">
            </div>
            <div class="form-group">
                <label>Apellidos:</label>
                <input type="text" id="new-apellidos" class="form-control" placeholder="EJ: PEREZ GARCIA">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>Grado:</label>
                    <select id="new-grado" class="form-control">
                        <option value="1">1°</option><option value="2">2°</option><option value="3">3°</option><option value="4">4°</option><option value="5">5°</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Sección:</label>
                    <select id="new-seccion" class="form-control">
                        <option value="A">A</option><option value="B">B</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top:15px;">
                <label>Teléfono:</label>
                <input type="tel" id="new-celular" class="form-control" placeholder="999888777">
            </div>
            <button class="btn-main btn-blue" onclick="guardarAlumno()">Guardar Estudiante</button>
        </div>

        <div id="impresion" class="section">
            <div class="form-group">
                <label>ID Imagen de Fondo (Google Drive):</label>
                <input type="text" id="bg-id" class="form-control" placeholder="Pegue el ID de la imagen aquí">
            </div>
            <div class="form-group">
                <label>Opción de Impresión:</label>
                <select id="print-type" class="form-control" onchange="togglePrintFields()">
                    <option value="individual">Por Alumno (DNI)</option>
                    <option value="seccion">Por Sección Completa</option>
                    <option value="todos">Todos los Alumnos</option>
                </select>
            </div>

            <div id="field-dni" class="form-group">
                <label>Ingrese DNI:</label>
                <input type="number" id="print-dni" class="form-control">
            </div>

            <div id="field-seccion" class="form-group" style="display:none; gap:10px;">
                <div style="flex:1">
                    <label>Grado:</label>
                    <select id="print-grado" class="form-control">
                        <option value="1">1°</option><option value="2">2°</option><option value="3">3°</option><option value="4">4°</option><option value="5">5°</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Sección:</label>
                    <select id="print-seccion" class="form-control">
                        <option value="A">A</option><option value="B">B</option>
                    </select>
                </div>
            </div>

            <button class="btn-main btn-dark" onclick="generarPDF()">Generar PDF (8 por hoja)</button>
        </div>
    </div>

<script>
    // --- REEMPLAZA ESTA URL CON TU GOOGLE APPS SCRIPT ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwORhsNxqXktlSlYH6d3cCekexEHgQYd8HLwcUYB_rQWsdplbBjTaTXntU4HOGLBjlkUA/exec'; 

    const html5QrCode = new Html5Qrcode("reader");

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        const titulos = {'escaneo':'Asistencia QR', 'agregar':'Nuevo Alumno', 'impresion':'Generador de Carnets'};
        document.getElementById('view-title').innerText = titulos[id];
        
        if(id === 'escaneo') iniciarCamara(); else detenerCamara();
        toggleMenu();
    }

    function togglePrintFields() {
        const type = document.getElementById('print-type').value;
        document.getElementById('field-dni').style.display = (type === 'individual') ? 'block' : 'none';
        document.getElementById('field-seccion').style.display = (type === 'seccion') ? 'flex' : 'none';
    }

    // --- ACCIÓN: ASISTENCIA ---
    function onScanSuccess(dni) {
        const est = document.getElementById('status-select').value;
        html5QrCode.stop().then(() => {
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'asistencia', id: dni, estado: est })
            })
            .then(r => r.text()).then(m => { alert(m); location.reload(); });
        });
    }

    // --- ACCIÓN: GUARDAR ALUMNO ---
    function guardarAlumno() {
        const datos = {
            action: 'agregar',
            id: document.getElementById('new-dni').value,
            nombres: document.getElementById('new-nombres').value.toUpperCase(),
            apellidos: document.getElementById('new-apellidos').value.toUpperCase(),
            gradoSeccion: document.getElementById('new-grado').value + document.getElementById('new-seccion').value,
            telefono: document.getElementById('new-celular').value,
            perfil: "ESTUDIANTE"
        };
        if(!datos.id || !datos.nombres) return alert("DNI y Nombres son obligatorios");
        
        fetch(scriptURL, { method: 'POST', body: JSON.stringify(datos) })
        .then(r => r.text()).then(m => { alert(m); showSection('escaneo'); });
    }

    // --- ACCIÓN: IMPRESIÓN ---
    function generarPDF() {
        const bgId = document.getElementById('bg-id').value;
        if(!bgId) return alert("Ingrese el ID de la imagen de fondo de Drive");

        const datos = {
            action: 'imprimir',
            bgId: bgId,
            tipo: document.getElementById('print-type').value,
            dni: document.getElementById('print-dni').value,
            gradoSeccion: document.getElementById('print-grado').value + document.getElementById('print-seccion').value
        };

        alert("Generando PDF... por favor espere a que abra la nueva pestaña.");

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(datos) })
        .then(r => r.text()).then(url => {
            if(url.includes("http")) window.open(url, '_blank'); else alert(url);
        });
    }

    function iniciarCamara() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .then(() => document.getElementById('status-msg').style.display = 'none')
        .catch(() => document.getElementById('status-msg').innerText = "Error: Cámara no detectada.");
    }

    function detenerCamara() { if(html5QrCode.isScanning) html5QrCode.stop(); }

    window.onload = iniciarCamara;
</script>
</body>
</html>
